<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penghitung Berat Badan Ideal</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h1>
        <i class="fas fa-utensils"></i>
        Hitung Berat Badan Ideal
      </h1>
    </div>
    <div class="breadcrumb">
      <a href="kontak.html" style="text-decoration: none; color: #f58220">
        Kontak Kami
      </a>
    </div>
    <div class="container">
      <h2>Hitung Berat Badan Ideal</h2>
      <p>
        Web ini membantu menghitung berat badan ideal berdasarkan tinggi badan
        dengan antarmuka sederhana dan responsif.
      </p>
      <div class="image-container">
        <img
          alt="Illustrasi pria dan wanita berdiri berdampingan"
          height="200"
          src="https://storage.googleapis.com/a1aa/image/LmDOVuZT8HrNBhDShgIwqSyb7Z9WrSkOACJXOSdYPjeDGy5JA.jpg"
          width="200"
        />
      </div>
      <form id="bbiForm">
        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <input
            id="nama"
            name="nama"
            placeholder="Masukkan Nama Lengkap Anda"
            type="text"
            required
          />
        </div>
        <div class="form-group">
          <label>Jenis Kelamin</label>
          <div class="radio-label">
            <input
              id="laki-laki"
              name="jenis_kelamin"
              type="radio"
              value="Laki-laki"
              required
            />
            <label for="laki-laki">Laki-laki</label>
          </div>
          <div class="radio-label">
            <input
              id="perempuan"
              name="jenis_kelamin"
              type="radio"
              value="Perempuan"
              required
            />
            <label for="perempuan">Perempuan (Tidak Hamil)</label>
          </div>
        </div>
        <div class="form-group">
          <label for="bb">Berat Badan (kg):</label>
          <input
            type="number"
            id="bb"
            placeholder="Masukkan Berat Badan"
            required
          />
        </div>
        <div class="form-group">
          <label for="tb">Tinggi Badan (cm):</label>
          <input
            type="number"
            id="tb"
            placeholder="Masukkan Tinggi Badan"
            required
          />
        </div>
        <div class="form-group">
          <button type="button" class="submit-btn" onclick="hitungBBI()">
            Hitung
          </button>
          <div class="result" id="result"></div>
        </div>
      </form>
    </div>
    <script>
      function hitungBBI() {
        const bb = parseFloat(document.getElementById("bb").value);
        const tb = parseFloat(document.getElementById("tb").value);

        if (isNaN(bb) || isNaN(tb)) {
          alert("Masukkan data yang valid!");
          return;
        }

        // Rumus Berat Badan Ideal
        const bbi = tb - 100 - 0.1 * (tb - 100);

        // Menampilkan hasil
        document.getElementById("result").innerHTML = `
          <h3>Berat Badan Ideal Anda adalah </h3><strong>${bbi.toFixed(
            2
          )} kg</strong>.
        `;
      }
    </script>
  </body>
</html>
